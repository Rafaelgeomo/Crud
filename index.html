<!DOCTYPE html>
<html lang="pt-BR">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <link rel="stylesheet" href="style.css">
   <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
   <title>CRUD</title>
</head>

<body>
   <header>
      <h1>Gerenciador de Tarefa</h1>
   </header>
   <div class="container">
      <div class="lista">
         <input type="text" placeholder="Digite sua tarefa" id="input-tarefa">
         <button id="botao-adicionar">Adicionar</button>
      </div>
      <ul id="lista-tarefa"></ul>
   </div>

   <div id="meu-popup" class="popup-escondido">
      <div class="popup-conteudo">
         <p>⚠️ Por favor, digite uma tarefa!</p>
         <button id="fechar-popup">Entendi</button>
      </div>
   </div>

</body>

<script src="script.js"></script>

</html>
